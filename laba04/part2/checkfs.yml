---
- name: Проверка модулей неиспользуемых файловых систем
  hosts: targets
  become: yes
  gather_facts: no

  vars:
    fs_list:
      - cramfs
      - freevxfs
      - jffs2
      - hfs
      - hfsplus
      - squashfs

  tasks:
    - name: Проверка статуса модулей
      shell: |
        for fs in {{ fs_list | join(' ') }}; do
          if lsmod | grep -q "^$fs"; then
            echo "$fs - не отключен"
          else
            echo "$fs - ОТКЛЮЧЕН"
          fi
        done
      register: result
      changed_when: false

    - name: Результат проверки
      debug:
        msg: "{{ result.stdout_lines }}"
