---
- name: Настройка требования стандарта
  hosts: targets
  become: yes
  gather_facts: no

  tasks:
    - name: UMASK 027
      lineinfile:
        path: /etc/login.defs
        regexp: '^UMASK'
        line: 'UMASK 027'

    - name: Создание orgnm.sh
      copy:
        content: |
          #!/bin/bash
          umask 027
        dest: /etc/profile.d/orgnm.sh
        mode: '0755'

    - name: DIR_MODE=0700
      lineinfile:
        path: /etc/adduser.conf
        regexp: '^DIR_MODE'
        line: 'DIR_MODE=0700'

    - name: Права /var/log
      shell: |
        find /var/log -type f -exec chmod g-wx,o-rwx {} \;
        find /var/log -type d -exec chmod g-w,o-rwx {} \;

    - name: Готово
      debug:
        msg: "Настройки применены"
